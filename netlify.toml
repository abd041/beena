[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  # Next.js inlines NEXT_PUBLIC_* and server config into build output — expected, not leaks.
  # Remove any duplicate SECRETS_SCAN_OMIT_KEYS from Netlify UI or it overrides this list.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_CALENDLY_URL,NEXT_PUBLIC_TALLY_CONTACT_FORM_ID,NEXT_PUBLIC_GA_MEASUREMENT_ID,NEXT_PUBLIC_GOOGLE_MAPS_EMBED_URL,NEXT_PUBLIC_LINKEDIN_URL,NEXT_PUBLIC_X_URL,NOTIFICATION_EMAIL_FROM,NOTIFICATION_EMAIL_TO"
